<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" />
  <!-- viewport-fit=cover lets the app extend under the iOS notch/home indicator;
       safe-area insets (see index.css) then pad content back into the safe area. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <!-- iOS Home Screen (standalone) app. "black" reserves an opaque status bar
       above the content (good for this dark UI) instead of "black-translucent",
       which renders content *behind* the status bar and reads as cramped. NOTE:
       iOS snapshots these tags when the icon is added — changing them requires
       removing and re-adding the Home Screen icon. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Alpha Terminal" />
  <title>Alpha Terminal</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
