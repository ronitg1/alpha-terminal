# Railway deployment config for the Alpha Terminal backend (web API).
# Railway builds the image from docker/Dockerfile.web and runs uvicorn bound to
# the platform-provided $PORT. Set secrets (MASSIVE_API_KEY, DEEPSEEK_API_KEY,
# FINNHUB_API_KEY, ALLOWED_ORIGINS, DATABASE_URL, …) in the Railway dashboard —
# never commit them. See DEPLOY.md for the full walkthrough.

[build]
builder = "dockerfile"
dockerfilePath = "docker/Dockerfile.web"

[deploy]
# Apply DB migrations before each release so the Postgres schema is current
# (the app no longer create_all's on Postgres — Alembic owns it). Runs from
# app/backend where alembic.ini lives; PYTHONPATH=/app is set in the image.
preDeployCommand = "sh -c 'cd app/backend && alembic upgrade head'"
startCommand = "uvicorn app.backend.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
